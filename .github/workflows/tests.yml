name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.3"
            testbench: "^10.0"
            laravel: "^12.0"
          - php: "8.4"
            testbench: "^10.0"
            laravel: "^12.0"
          - php: "8.5"
            testbench: "^10.0"
            laravel: "^12.0"
          - php: "8.3"
            testbench: "^11.0"
            laravel: "^13.0"
          - php: "8.4"
            testbench: "^11.0"
            laravel: "^13.0"
          - php: "8.5"
            testbench: "^11.0"
            laravel: "^13.0"

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite, pdo_sqlite
          coverage: none

      - name: Validate composer
        run: composer validate --strict

      - name: Select Laravel version
        run: composer require "illuminate/support:${{ matrix.laravel }}" "illuminate/database:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test
